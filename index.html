<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardiac Clinical Lab | M. Rizwan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --medical-red: #8b0000;
            --gold: #d4af37;
            --dark-bg: #0f172a;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f1f5f9; color: #1e293b; }

        /* Professional Header */
        header {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1e293b 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
            border-bottom: 5px solid var(--gold);
        }

        .heart-pulse {
            font-size: 50px;
            animation: beat 1s infinite;
            display: inline-block;
            margin-bottom: 10px;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 0; letter-spacing: 1px; }
        .student-badge {
            background: var(--gold);
            color: black;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        /* Calculator Card */
        .main-content { max-width: 900px; margin: -50px auto 50px; padding: 0 20px; }
        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            padding: 40px;
            border-top: 4px solid var(--medical-red);
        }

        .input-wrapper { text-align: center; margin-bottom: 40px; }
        .input-wrapper label { display: block; font-weight: 600; margin-bottom: 10px; color: #64748b; }
        input {
            width: 180px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 2rem;
            text-align: center;
            font-weight: 700;
            color: var(--medical-red);
        }
        input:focus { outline: none; border-color: var(--medical-red); box-shadow: 0 0 10px rgba(139, 0, 0, 0.1); }

        /* Table */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        th { background-color: #f8fafc; color: #475569; padding: 18px; text-align: left; font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 1rem; }
        .stage-name { font-weight: 600; color: #334155; }
        .val-cell { font-family: 'Courier New', monospace; font-weight: bold; color: var(--medical-red); text-align: right; }
        
        /* Status Indicator */
        #status-tag { margin-top: 10px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }

        /* Professional Footer */
        footer { background: var(--dark-bg); color: #94a3b8; padding: 60px 20px; text-align: center; }
        .contact-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
        }
        .contact-btn:hover { background: var(--gold); color: black; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="heart-pulse">❤️</div>
    <h1>Cardiac Physiology Lab</h1>
    <div class="student-badge">Developed by: Muhammad Rizwan</div>
    <p style="opacity: 0.7; margin-top: 10px;">PharmD Analysis Tool | University of Lahore</p>
</header>

<div class="main-content">
    <div class="card">
        <div class="input-wrapper">
            <label>Subject Heart Rate (BPM)</label>
            <input type="number" id="bpmInput" value="75" oninput="calculate()">
            <div id="status-tag">Status: Normal</div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Phase Description</th>
                        <th style="text-align: right;">Duration (Seconds)</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<footer>
    <p>Academic Purpose Only - Clinical Data Model</p>
    <p>Contact: <strong>fa25-phm-072@cuilahore.edu.pk</strong></p>
    <a href="mailto:fa25-phm-072@cuilahore.edu.pk" class="contact-btn">Send Inquiry</a>
    <h3 style="color: white; margin-top: 30px;">Best of Luck!</h3>
</footer>

<script>
    function calculate() {
        const hr = document.getElementById('bpmInput').value;
        const status = document.getElementById('status-tag');
        const pulse = document.querySelector('.heart-pulse');
        
        if (hr <= 0 || !hr) return;

        // 1. Update Status & Animation
        pulse.style.animationDuration = (60/hr) + 's';
        if(hr < 60) { status.innerText = "Status: Bradycardia"; status.style.color = "#3b82f6"; }
        else if(hr > 100) { status.innerText = "Status: Tachycardia"; status.style.color = "#ef4444"; }
        else { status.innerText = "Status: Normal Sinus Rhythm"; status.style.color = "#10b981"; }

        // 2. Math Logic
        const totalDuration = 60 / hr;
        const scale = totalDuration / 0.8;

        const stages = [
            "Isovolumetric ventricular contraction",
            "Rapid ventricular ejection phase",
            "Slow ventricular ejection phase",
            "Isovolumetric ventricular relaxation",
            "Rapid (passive) ventricular filling",
            "Slow ventricular filling (diastasis)",
            "Atrial contraction"
        ];
        const times = [0.03, 0.08, 0.16, 0.05, 0.16, 0.18, 0.14];

        let html = "";
        stages.forEach((name, i) => {
            html += `<tr>
                <td class="stage-name">${i+1}. ${name}</td>
                <td class="val-cell">${(times[i] * scale).toFixed(3)} s</td>
            </tr>`;
        });

        html += `<tr style="background: #fdf2f2; font-weight: 800;">
            <td>Total Cardiac Cycle Duration</td>
            <td class="val-cell" style="color: #000;">${totalDuration.toFixed(3)} s</td>
        </tr>`;

        document.getElementById('resultBody').innerHTML = html;
    }

    calculate(); // Start
</script>

</body>
</html>
